    <!-- font & base (optional, just to match clean style) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- tiny extra for tabular nums etc -->
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap");
      * {
        font-family: "Inter", system-ui, sans-serif;
      }
      .font-display {
        font-family: "Inter", sans-serif;
      }

      /* From Uiverse.io by andrew-demchenk0 */
      .card {
        --main-color: #000;
        --submain-color: #78858f;
        --bg-color: #fff;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
        position: relative;
        width: 300px;
        /* Ajustado a auto para que quepan tus botones */
        height: auto;
        min-height: 384px;
        padding-bottom: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        border-radius: 20px;
        background: var(--bg-color);
        box-shadow:
          0 20px 25px -5px rgb(0 0 0 / 0.1),
          0 8px 10px -6px rgb(0 0 0 / 0.1);
      }

      .card__img {
        height: 192px;
        width: 100%;
      }

      .card__img svg {
        height: 100%;
        width: 100%;
        object-fit: cover;
        border-radius: 20px 20px 0 0;
      }

      .card__avatar {
        position: absolute;
        width: 114px;
        height: 114px;
        background: var(--bg-color);
        border-radius: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        /* Ajustado para centrarse en la línea de la imagen (192px - mitad del avatar 57px) */
        top: 135px;
      }

      .card__avatar svg {
        width: 100px;
        height: 100px;
      }

      .card__title {
        margin-top: 60px;
        font-weight: 500;
        font-size: 18px;
        color: var(--main-color);
      }

      .card__subtitle {
        margin-top: 10px;
        font-weight: 400;
        font-size: 15px;
        color: var(--submain-color);
        margin-bottom: 15px;
      }
    </style>
